server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
file:
  upload-dir: uploads

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 123456

  security:
    user:
      name: user
      password: user

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: akhivenkatesh44@gmail.com
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}


