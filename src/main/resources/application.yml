server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 123456

  security:
    user:
      name: user
      password: user

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true

  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379

